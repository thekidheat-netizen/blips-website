<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blips — Admin</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA3ctp1Waczjq5VJZp-rO0I1eRa916I_8s&libraries=places"></script>
    <style>
        /* ═════════ Design tokens — mirrors the mobile app palette ═════════ */
        :root {
            --bg: #16120F;            /* page */
            --panel: #1E1712;         /* sidebar / cards */
            --card: #261E18;          /* elevated cards */
            --well: #2C241D;          /* inputs / wells */
            --border: #33291F;
            --border-strong: #4A3D2E;
            --cream: #F2E9DA;         /* primary text */
            --text: #D8CCBB;          /* body text */
            --muted: #9C8F80;         /* secondary text */
            --gold: #C2902F;          /* accent */
            --gold-soft: #D9B36A;
            --maroon: #6B2B6C;        /* brand secondary (chips/gradients) */
            --ok: #4CAF50;
            --warn: #FF9800;
            --danger: #FF4757;
            --info: #4a90e2;
            --radius: 12px;
            --sidebar-w: 232px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px;
        }
        a { color: var(--gold); text-decoration: none; }
        ::selection { background: rgba(194,144,47,0.35); color: var(--cream); }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

        /* ═════════ Login ═════════ */
        #loginView {
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(194,144,47,0.08) 0%, transparent 55%), var(--bg);
        }
        .login-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
            padding: 42px 38px; width: 100%; max-width: 400px; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        .login-card img { height: 52px; display: block; margin: 0 auto 6px; }
        .login-card h1 { color: var(--muted); font-size: 15px; text-align: center; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 28px; }
        .login-card label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 6px; }
        .login-card input {
            width: 100%; padding: 13px 14px; background: var(--well); border: 1px solid var(--border-strong);
            border-radius: 10px; color: var(--cream); font-size: 15px; font-family: inherit;
        }
        .login-card input:focus { outline: none; border-color: var(--gold); }
        .login-card button {
            width: 100%; margin-top: 24px; padding: 14px; background: var(--gold); color: #1A1410;
            font-weight: 900; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; font-family: inherit;
        }
        .login-card button:hover { background: var(--gold-soft); }
        .login-err { color: var(--danger); font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }

        /* ═════════ App shell ═════════ */
        #appView { display: none; }
        #appView.on { display: block; }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
            background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 50;
        }
        .sidebar .brand { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
        .sidebar .brand img { height: 34px; }
        .sidebar nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
        .navlink {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-bottom: 2px;
            border-radius: 9px; color: var(--text); font-weight: 700; font-size: 13.5px; cursor: pointer;
            border: 1px solid transparent;
        }
        .navlink:hover { background: var(--card); color: var(--cream); }
        .navlink.active { background: var(--card); color: var(--gold); border-color: var(--border); }
        .navlink .ico { width: 20px; text-align: center; font-size: 15px; }
        .navlink .badge {
            margin-left: auto; background: var(--danger); color: #fff; font-size: 11px; font-weight: 900;
            border-radius: 9px; padding: 1px 7px; min-width: 20px; text-align: center;
        }
        .navlink .badge.zero { display: none; }
        .sidebar .foot { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
        .sidebar .foot a { display: block; margin-top: 6px; cursor: pointer; }

        .main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
        .topbar {
            position: sticky; top: 0; z-index: 40; display: flex; align-items: center; gap: 14px;
            padding: 12px 24px; background: rgba(22,18,15,0.92); backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }
        .topbar .searchbox {
            flex: 1; max-width: 520px; display: flex; align-items: center; gap: 8px;
            background: var(--well); border: 1px solid var(--border-strong); border-radius: 10px;
            padding: 9px 12px; color: var(--muted); cursor: text; font-size: 13.5px;
        }
        .topbar .searchbox kbd {
            margin-left: auto; background: var(--card); border: 1px solid var(--border-strong);
            border-radius: 5px; padding: 1px 6px; font-size: 11px; font-family: inherit; color: var(--muted);
        }
        .topbar .who { margin-left: auto; color: var(--muted); font-size: 13px; }
        #view { padding: 24px; flex: 1; }

        /* ═════════ Shared components ═════════ */
        h2.page { color: var(--cream); font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        p.pagesub { color: var(--muted); margin-bottom: 20px; }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .toolbar input[type=text], .toolbar input[type=search], .toolbar select {
            padding: 10px 12px; background: var(--well); border: 1px solid var(--border-strong);
            border-radius: 9px; color: var(--cream); font-size: 13.5px; font-family: inherit;
        }
        .toolbar input:focus, .toolbar select:focus { outline: none; border-color: var(--gold); }

        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 9px;
            border: 1px solid transparent; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 13px;
            background: var(--card); color: var(--text); transition: all 0.15s ease;
        }
        .btn:hover { border-color: var(--border-strong); color: var(--cream); }
        .btn.gold { background: var(--gold); color: #1A1410; }
        .btn.gold:hover { background: var(--gold-soft); }
        .btn.danger { background: rgba(255,71,87,0.14); color: var(--danger); border-color: rgba(255,71,87,0.3); }
        .btn.danger:hover { background: rgba(255,71,87,0.25); }
        .btn.warn { background: rgba(255,152,0,0.14); color: var(--warn); border-color: rgba(255,152,0,0.3); }
        .btn.ok { background: rgba(76,175,80,0.14); color: var(--ok); border-color: rgba(76,175,80,0.3); }
        .btn.sm { padding: 5px 10px; font-size: 12px; border-radius: 7px; }
        .btn:disabled { opacity: 0.5; cursor: default; }

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
        .grid { display: grid; gap: 14px; }

        table.tbl { width: 100%; border-collapse: collapse; background: var(--panel); }
        .tblwrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: auto; }
        table.tbl th {
            position: sticky; top: 0; background: var(--card); color: var(--muted); text-align: left;
            font-size: 11.5px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em;
            padding: 11px 14px; border-bottom: 1px solid var(--border-strong); white-space: nowrap; z-index: 2;
        }
        table.tbl td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        table.tbl tr:last-child td { border-bottom: none; }
        table.tbl tbody tr:hover { background: rgba(194,144,47,0.045); }

        .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 900; }
        .pill.ok { background: rgba(76,175,80,0.16); color: var(--ok); }
        .pill.warn { background: rgba(255,152,0,0.16); color: var(--warn); }
        .pill.danger { background: rgba(255,71,87,0.16); color: var(--danger); }
        .pill.info { background: rgba(74,144,226,0.16); color: var(--info); }
        .pill.gold { background: rgba(194,144,47,0.16); color: var(--gold-soft); }
        .pill.muted { background: rgba(156,143,128,0.16); color: var(--muted); }

        .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: var(--well); }
        .avatar.fallback { display: inline-flex; align-items: center; justify-content: center; color: var(--gold); font-weight: 900; font-size: 15px; }
        .userchip { display: flex; align-items: center; gap: 10px; }
        .userchip .nm { color: var(--cream); font-weight: 700; cursor: pointer; }
        .userchip .nm:hover { color: var(--gold); }
        .userchip .sub { color: var(--muted); font-size: 12px; }

        .empty { padding: 44px; text-align: center; color: var(--muted); }
        .spin { padding: 44px; text-align: center; color: var(--muted); }
        .spin::before { content: ''; display: inline-block; width: 18px; height: 18px; margin-right: 10px; vertical-align: -4px;
            border: 2px solid var(--border-strong); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
        @keyframes rot { to { transform: rotate(360deg); } }

        /* Stat tiles */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .stat { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
        .stat h4 { color: var(--muted); font-size: 11.5px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat .num { color: var(--cream); font-size: 26px; font-weight: 900; }
        .stat.hot .num { color: var(--gold); }

        /* Drawer (slide-over detail panel) */
        #drawerRoot { position: fixed; inset: 0; z-index: 900; display: none; }
        #drawerRoot.on { display: block; }
        #drawerRoot .scrim { position: absolute; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(2px); }
        #drawerRoot .panel {
            position: absolute; top: 0; right: 0; bottom: 0; width: min(640px, 94vw);
            background: var(--panel); border-left: 1px solid var(--border-strong);
            box-shadow: -30px 0 80px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            animation: slidein 0.22s ease;
        }
        #drawerRoot .panel.wide { width: min(880px, 96vw); }
        @keyframes slidein { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }
        #drawerRoot .dhead { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--border); }
        #drawerRoot .dhead h3 { color: var(--cream); font-size: 17px; font-weight: 900; flex: 1; }
        #drawerRoot .dhead .x { cursor: pointer; color: var(--muted); font-size: 22px; padding: 4px 8px; }
        #drawerRoot .dhead .x:hover { color: var(--cream); }
        #drawerRoot .dbody { flex: 1; overflow-y: auto; padding: 22px; }

        /* Modal + toast */
        #modalRoot .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #toastRoot { position: fixed; bottom: 24px; right: 24px; z-index: 100000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card); border: 1px solid var(--border-strong); border-left: 4px solid var(--gold); color: var(--cream); border-radius: 10px; padding: 13px 16px; min-width: 260px; max-width: 420px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); font-size: 13.5px; animation: slidein 0.18s ease; }
        .toast.success { border-left-color: var(--ok); }
        .toast.error { border-left-color: var(--danger); }

        /* Video lightbox */
        #playerRoot { position: fixed; inset: 0; z-index: 950; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; }
        #playerRoot.on { display: flex; }
        #playerRoot video { max-width: min(420px, 92vw); max-height: 86vh; border-radius: 14px; background: #000; }
        #playerRoot .x { position: absolute; top: 22px; right: 28px; color: #fff; font-size: 30px; cursor: pointer; }

        /* ⌘K palette */
        #cmdkRoot { position: fixed; inset: 0; z-index: 980; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); display: none; align-items: flex-start; justify-content: center; padding-top: 12vh; }
        #cmdkRoot.on { display: flex; }
        .cmdk { width: min(600px, 92vw); background: var(--panel); border: 1px solid var(--border-strong); border-radius: 14px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.6); }
        .cmdk input { width: 100%; padding: 16px 18px; background: var(--well); border: none; border-bottom: 1px solid var(--border); color: var(--cream); font-size: 16px; font-family: inherit; }
        .cmdk input:focus { outline: none; }
        .cmdk .results { max-height: 46vh; overflow-y: auto; }
        .cmdk .hit { display: flex; align-items: center; gap: 12px; padding: 11px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .cmdk .hit:hover, .cmdk .hit.sel { background: var(--card); }
        .cmdk .hint { padding: 10px 16px; color: var(--muted); font-size: 12px; }

        /* Section blocks inside drawers/pages */
        .sect { margin-bottom: 20px; }
        .sect h4 { color: var(--gold-soft); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
        .kv { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; font-size: 13.5px; }
        .kv .k { color: var(--muted); }
        .kv .v { color: var(--cream); word-break: break-word; }
        .actionrow { display: flex; gap: 8px; flex-wrap: wrap; }

        .thumb { width: 84px; height: 84px; border-radius: 10px; object-fit: cover; background: var(--well); cursor: pointer; }
        .thumb.ph { display: inline-flex; align-items: center; justify-content: center; font-size: 26px; }

        @media (max-width: 860px) {
            .sidebar { width: 64px; }
            .sidebar .brand img { height: 26px; }
            .navlink span.lbl, .sidebar .foot { display: none; }
            .main { margin-left: 64px; }
        }
    </style>
</head>
<body>
    <!-- ═════════ Login ═════════ -->
    <div id="loginView">
        <div class="login-card">
            <img src="/assets/logo-dark.png" alt="blips">
            <h1>Admin</h1>
            <label>Email</label>
            <input type="email" id="loginEmail" autocomplete="username" placeholder="admin@blipsdigital.com">
            <label>Password</label>
            <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••">
            <button id="loginButton">Sign in</button>
            <div class="login-err" id="loginErr"></div>
        </div>
    </div>

    <!-- ═════════ App shell ═════════ -->
    <div id="appView">
        <aside class="sidebar">
            <div class="brand"><img src="/assets/logo-dark.png" alt="blips"></div>
            <nav id="sideNav"></nav>
            <div class="foot">
                <span id="whoami"></span>
                <a onclick="logout()">Sign out</a>
                <a href="/admin-legacy.html">Legacy admin</a>
            </div>
        </aside>
        <div class="main">
            <div class="topbar">
                <div class="searchbox" onclick="ui.openCmdK()">
                    <span>🔍</span><span>Search users, blips, anything…</span><kbd>⌘K</kbd>
                </div>
                <div class="who" id="topWho"></div>
            </div>
            <div id="view"></div>
        </div>
    </div>

    <div id="drawerRoot"><div class="scrim" onclick="ui.closeDrawer()"></div><div class="panel" id="drawerPanel"></div></div>
    <div id="modalRoot"></div>
    <div id="toastRoot"></div>
    <div id="playerRoot"><span class="x" onclick="ui.closePlayer()">✕</span><video controls playsinline></video></div>
    <div id="cmdkRoot"><div class="cmdk"><input id="cmdkInput" placeholder="Search username, email, or user ID…"><div class="results" id="cmdkResults"></div><div class="hint">↑↓ navigate · Enter open · Esc close</div></div></div>

    <script>
        // ═════════ Config + client ═════════
        const SUPABASE_URL = 'https://obtsdsztblemlbvcrcdy.supabase.co';
        // Publishable key (rotated 2026-05-19 after the leaked service_role
        // JWT incident; legacy JWT keys are disabled project-wide).
        const SUPABASE_ANON_KEY = 'sb_publishable_dTDdzGCk9ED9wnXScJUzSA_jz6XKYZv';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // Legacy alias so ported code keeps working verbatim.
        const supabaseClient = sb;
        let currentAdminId = null;

        // ═════════ Tiny helpers ═════════
        const $ = (id) => document.getElementById(id);
        function esc(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        function jsEsc(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'');
        }
        function timeAgo(iso) {
            if (!iso) return '—';
            const s = (Date.now() - new Date(iso).getTime()) / 1000;
            if (s < 60) return 'just now';
            if (s < 3600) return `${Math.floor(s/60)}m ago`;
            if (s < 86400) return `${Math.floor(s/3600)}h ago`;
            if (s < 86400*30) return `${Math.floor(s/86400)}d ago`;
            return new Date(iso).toLocaleDateString();
        }
        function fmtDate(iso) { return iso ? new Date(iso).toLocaleString() : '—'; }
        function formatUntil(iso) {
            if (!iso) return '—';
            let ms = new Date(iso).getTime() - Date.now();
            if (ms <= 0) return 'overdue';
            const d = Math.floor(ms / 86400000); ms -= d * 86400000;
            const h = Math.floor(ms / 3600000);  ms -= h * 3600000;
            const m = Math.floor(ms / 60000);
            if (d > 0) return `in ${d}d ${h}h`;
            if (h > 0) return `in ${h}h ${m}m`;
            return `in ${m}m`;
        }
        function avatarHtml(url, name, size = 34) {
            const st = `width:${size}px;height:${size}px;`;
            if (url) return `<img class="avatar" style="${st}" src="${esc(url)}" onerror="this.style.display='none'">`;
            return `<div class="avatar fallback" style="${st}">${esc((name||'?').charAt(0).toUpperCase())}</div>`;
        }

        // ═════════ Admin plumbing (ported from legacy) ═════════
        async function fetchEmailMap(ids) {
            const unique = [...new Set((ids || []).filter(Boolean))];
            if (!unique.length) return {};
            try {
                const { data } = await sb.rpc('admin_get_user_emails', { p_ids: unique });
                return Object.fromEntries((data || []).map(r => [r.id, r.email]));
            } catch (e) {
                console.warn('[admin] fetchEmailMap failed:', e);
                return {};
            }
        }
        async function logAdminAction(actionType, targetUserId, actionDetails, notes) {
            const { error } = await sb.from('admin_logs').insert({
                admin_id: currentAdminId, target_user_id: targetUserId,
                action_type: actionType, action_details: actionDetails, notes: notes,
            });
            if (error) {
                console.error('Error logging admin action:', error);
                ui.toast('Action completed but logging failed: ' + error.message, 'error', 5000);
            }
        }

        // ═════════ UI system: toast / confirm / prompt / drawer / player ═════════
        const ui = {};
        ui.toast = function(msg, kind = 'info', ms = 3500) {
            const el = document.createElement('div');
            el.className = 'toast ' + kind;
            el.textContent = msg;
            $('toastRoot').appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 320); }, ms);
        };
        // Legacy alias — ported section code calls adminToast().
        const adminToast = ui.toast;

        ui.confirm = function(opts) {
            const { title='Confirm', message='Are you sure?', dangerLevel='neutral',
                    confirmLabel='Confirm', cancelLabel='Cancel', requireType=null } = opts || {};
            return new Promise(resolve => {
                const accent = dangerLevel === 'destructive' ? 'var(--danger)' : dangerLevel === 'warning' ? 'var(--warn)' : 'var(--gold)';
                const root = $('modalRoot');
                root.innerHTML = `
                    <div class="overlay">
                        <div style="background:var(--panel); border:1px solid var(--border-strong); border-radius:16px; padding:28px; max-width:480px; width:100%;">
                            <h3 style="color:${accent}; margin-bottom:12px; font-size:18px;">${esc(title)}</h3>
                            <div style="color:var(--text); line-height:1.55; margin-bottom:20px; white-space:pre-line;">${esc(message)}</div>
                            ${requireType ? `<div style="color:var(--muted); font-size:12.5px; margin-bottom:8px;">Type <b style="color:var(--cream)">${esc(requireType)}</b> to confirm:</div>
                            <input id="mReq" style="width:100%; padding:11px; background:var(--well); border:1px solid var(--border-strong); border-radius:9px; color:var(--cream); font-family:inherit; margin-bottom:18px;">` : ''}
                            <div style="display:flex; gap:10px; justify-content:flex-end;">
                                <button class="btn" id="mCancel">${esc(cancelLabel)}</button>
                                <button class="btn ${dangerLevel==='destructive'?'danger':dangerLevel==='warning'?'warn':'gold'}" id="mOk" ${requireType?'disabled':''}>${esc(confirmLabel)}</button>
                            </div>
                        </div>
                    </div>`;
                const done = (v) => { root.innerHTML = ''; document.removeEventListener('keydown', onKey); resolve(v); };
                const onKey = (e) => { if (e.key === 'Escape') done(false); };
                document.addEventListener('keydown', onKey);
                $('mCancel').onclick = () => done(false);
                $('mOk').onclick = () => done(true);
                if (requireType) {
                    const inp = $('mReq');
                    inp.focus();
                    inp.oninput = () => { $('mOk').disabled = inp.value !== requireType; };
                }
            });
        };
        const adminConfirm = ui.confirm;

        ui.prompt = function(opts) {
            const { title='Input', message='', placeholder='', multiline=false, required=true, initial='' } = opts || {};
            return new Promise(resolve => {
                const root = $('modalRoot');
                const field = multiline
                    ? `<textarea id="mIn" rows="4" placeholder="${esc(placeholder)}" style="width:100%; padding:11px; background:var(--well); border:1px solid var(--border-strong); border-radius:9px; color:var(--cream); font-family:inherit; resize:vertical;">${esc(initial)}</textarea>`
                    : `<input id="mIn" placeholder="${esc(placeholder)}" value="${esc(initial)}" style="width:100%; padding:11px; background:var(--well); border:1px solid var(--border-strong); border-radius:9px; color:var(--cream); font-family:inherit;">`;
                root.innerHTML = `
                    <div class="overlay">
                        <div style="background:var(--panel); border:1px solid var(--border-strong); border-radius:16px; padding:28px; max-width:480px; width:100%;">
                            <h3 style="color:var(--gold); margin-bottom:12px; font-size:18px;">${esc(title)}</h3>
                            ${message ? `<div style="color:var(--text); line-height:1.55; margin-bottom:14px;">${esc(message)}</div>` : ''}
                            ${field}
                            <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:18px;">
                                <button class="btn" id="mCancel">Cancel</button>
                                <button class="btn gold" id="mOk">OK</button>
                            </div>
                        </div>
                    </div>`;
                const done = (v) => { root.innerHTML = ''; document.removeEventListener('keydown', onKey); resolve(v); };
                const onKey = (e) => { if (e.key === 'Escape') done(null); };
                document.addEventListener('keydown', onKey);
                $('mCancel').onclick = () => done(null);
                $('mOk').onclick = () => {
                    const v = $('mIn').value.trim();
                    if (required && !v) { $('mIn').style.borderColor = 'var(--danger)'; return; }
                    done(v || null);
                };
                $('mIn').focus();
                if (!multiline) $('mIn').addEventListener('keypress', e => { if (e.key === 'Enter') $('mOk').click(); });
            });
        };
        const adminPrompt = ui.prompt;

        let _drawerOnClose = null;
        ui.drawer = function({ title = '', html = '', onMount = null, wide = false, onClose = null }) {
            const rootEl = $('drawerRoot');
            const panel = $('drawerPanel');
            panel.className = 'panel' + (wide ? ' wide' : '');
            panel.innerHTML = `
                <div class="dhead"><h3>${title}</h3><span class="x" onclick="ui.closeDrawer()">✕</span></div>
                <div class="dbody" id="drawerBody">${html}</div>`;
            rootEl.classList.add('on');
            _drawerOnClose = onClose;
            if (onMount) onMount($('drawerBody'));
        };
        ui.closeDrawer = function() {
            $('drawerRoot').classList.remove('on');
            $('drawerPanel').innerHTML = '';
            if (_drawerOnClose) { try { _drawerOnClose(); } catch (e) {} _drawerOnClose = null; }
        };
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && $('drawerRoot').classList.contains('on') && !$('modalRoot').innerHTML) ui.closeDrawer();
        });

        ui.player = function(url) {
            const rootEl = $('playerRoot');
            const v = rootEl.querySelector('video');
            v.src = url;
            rootEl.classList.add('on');
            v.play().catch(() => {});
        };
        ui.closePlayer = function() {
            const rootEl = $('playerRoot');
            const v = rootEl.querySelector('video');
            v.pause(); v.src = '';
            rootEl.classList.remove('on');
        };
        $('playerRoot').addEventListener('click', e => { if (e.target === $('playerRoot')) ui.closePlayer(); });

        // ═════════ Cache ═════════
        const cache = {
            _m: new Map(),
            async get(key, loader, ttl = 30000) {
                const hit = this._m.get(key);
                if (hit && Date.now() - hit.t < ttl) return hit.v;
                const v = await loader();
                this._m.set(key, { v, t: Date.now() });
                return v;
            },
            bust(prefix) {
                for (const k of [...this._m.keys()]) if (k.startsWith(prefix)) this._m.delete(k);
            },
        };

        // ═════════ Router ═════════
        const routes = {};
        function registerRoute(name, def) { routes[name] = def; }
        function navigate(hash) { location.hash = hash; }
        function currentRoute() {
            const h = (location.hash || '#/dashboard').replace(/^#\//, '');
            const parts = h.split('/');
            const name = routes[parts[0]] ? parts[0] : 'dashboard';
            return { name, params: parts.slice(1).map(decodeURIComponent) };
        }
        async function renderRoute() {
            const { name, params } = currentRoute();
            document.querySelectorAll('.navlink').forEach(el => el.classList.toggle('active', el.dataset.route === name));
            const view = $('view');
            view.innerHTML = '<div class="spin">Loading…</div>';
            try {
                await routes[name].render(view, params);
            } catch (e) {
                console.error('[route:' + name + ']', e);
                view.innerHTML = `<div class="empty">Something broke rendering this page.<br><span style="font-size:12px">${esc(e.message)}</span></div>`;
            }
        }
        window.addEventListener('hashchange', renderRoute);

        function buildSidebar() {
            const order = Object.entries(routes).sort((a, b) => (a[1].order ?? 99) - (b[1].order ?? 99));
            $('sideNav').innerHTML = order.map(([name, def]) => `
                <div class="navlink" data-route="${name}" onclick="navigate('#/${name}')">
                    <span class="ico">${def.icon || '•'}</span><span class="lbl">${def.title}</span>
                    ${def.badgeKey ? `<span class="badge zero" id="badge-${def.badgeKey}">0</span>` : ''}
                </div>`).join('');
        }

        // ═════════ Pending badges (parallel; dashboard reuses) ═════════
        async function fetchPendingCounts() {
            const [br, ar, cr, pr, vr, ver, ap] = await Promise.all([
                sb.from('blip_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
                sb.from('announcement_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
                sb.from('blip_comment_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
                sb.from('profile_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending').neq('report_type', 'appeal'),
                sb.from('video_reply_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
                sb.from('verification_applications').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
                sb.from('profile_reports').select('*', { count: 'exact', head: true }).eq('status', 'pending').eq('report_type', 'appeal'),
            ]);
            return {
                reports: (br.count||0) + (ar.count||0) + (cr.count||0) + (pr.count||0) + (vr.count||0),
                verifications: ver.count || 0,
                appeals: ap.count || 0,
            };
        }
        async function refreshBadges() {
            try {
                const c = await cache.get('badges', fetchPendingCounts, 15000);
                for (const [k, v] of Object.entries(c)) {
                    const b = $('badge-' + k);
                    if (b) { b.textContent = v; b.classList.toggle('zero', !v); }
                }
            } catch (e) { console.warn('badges failed', e); }
        }

        // ═════════ ⌘K global search ═════════
        ui.openCmdK = function() {
            $('cmdkRoot').classList.add('on');
            const inp = $('cmdkInput');
            inp.value = ''; $('cmdkResults').innerHTML = '';
            inp.focus();
        };
        ui.closeCmdK = function() { $('cmdkRoot').classList.remove('on'); };
        document.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); ui.openCmdK(); }
            if (e.key === 'Escape' && $('cmdkRoot').classList.contains('on')) ui.closeCmdK();
        });
        $('cmdkRoot').addEventListener('click', e => { if (e.target === $('cmdkRoot')) ui.closeCmdK(); });
        let _cmdkTimer = null;
        $('cmdkInput').addEventListener('input', () => {
            clearTimeout(_cmdkTimer);
            _cmdkTimer = setTimeout(runCmdK, 250);
        });
        $('cmdkInput').addEventListener('keydown', e => {
            const hits = [...document.querySelectorAll('#cmdkResults .hit')];
            const sel = document.querySelector('#cmdkResults .hit.sel');
            let i = hits.indexOf(sel);
            if (e.key === 'ArrowDown') { e.preventDefault(); if (hits.length) { if (sel) sel.classList.remove('sel'); hits[Math.min(i+1, hits.length-1)].classList.add('sel'); } }
            if (e.key === 'ArrowUp') { e.preventDefault(); if (hits.length) { if (sel) sel.classList.remove('sel'); hits[Math.max(i-1, 0)].classList.add('sel'); } }
            if (e.key === 'Enter' && sel) sel.click();
        });
        async function runCmdK() {
            const q = $('cmdkInput').value.trim();
            if (q.length < 2) { $('cmdkResults').innerHTML = ''; return; }
            $('cmdkResults').innerHTML = '<div class="hint">Searching…</div>';
            // Server-side search across ALL users (legacy tab search only
            // filtered the currently-loaded page).
            const { data: allHits, error } = await sb.rpc('admin_search_users', { p_query: q });
            const data = (allHits || []).slice(0, 12);
            if (error) { $('cmdkResults').innerHTML = `<div class="hint">Search failed: ${esc(error.message)}</div>`; return; }
            if (!data.length) { $('cmdkResults').innerHTML = '<div class="hint">No users found</div>'; return; }
            $('cmdkResults').innerHTML = data.map((u, i) => `
                <div class="hit ${i===0?'sel':''}" onclick="ui.closeCmdK(); openUser('${jsEsc(u.id)}')">
                    ${avatarHtml(u.avatar_url, u.username, 30)}
                    <div><div style="color:var(--cream); font-weight:700;">@${esc(u.username || '—')}</div>
                    <div style="color:var(--muted); font-size:12px;">${esc(u.display_name || '')}${u.is_banned ? ' · <span style="color:var(--danger)">banned</span>' : ''}</div></div>
                </div>`).join('');
        }

        // ═════════ Auth ═════════
        async function verifyAdminSession(session) {
            const { data: row, error } = await sb.from('users')
                .select('is_admin, is_banned, deleted_at, username')
                .eq('id', session.user.id).single();
            if (error || !row?.is_admin || row.is_banned || row.deleted_at) return null;
            return row;
        }
        async function enterApp(session, row) {
            currentAdminId = session.user.id;
            $('whoami').textContent = '@' + (row.username || 'admin');
            $('topWho').textContent = '@' + (row.username || 'admin');
            $('loginView').style.display = 'none';
            $('appView').classList.add('on');
            buildSidebar();
            renderRoute();
            refreshBadges();
            // Realtime: report-table changes → refresh badges + bust caches
            // (debounced — a burst of inserts shouldn't hammer the DB).
            let t = null;
            const kick = () => { clearTimeout(t); t = setTimeout(() => { cache.bust('badges'); cache.bust('reports'); refreshBadges(); }, 800); };
            sb.channel('admin-reports')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'blip_reports' }, kick)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'announcement_reports' }, kick)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profile_reports' }, kick)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'video_reply_reports' }, kick)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'blip_comment_reports' }, kick)
                .subscribe();
        }
        async function login() {
            const err = $('loginErr');
            err.textContent = '';
            const { data, error } = await sb.auth.signInWithPassword({
                email: $('loginEmail').value.trim(),
                password: $('loginPassword').value,
            });
            if (error) { err.textContent = error.message; return; }
            const row = await verifyAdminSession(data.session);
            if (!row) {
                await sb.auth.signOut();
                err.textContent = 'This account does not have admin access.';
                return;
            }
            enterApp(data.session, row);
        }
        async function logout() { await sb.auth.signOut(); location.reload(); }
        $('loginButton').addEventListener('click', e => { e.preventDefault(); login(); });
        $('loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

        // Startup gate — same behavior as legacy: re-verify is_admin on every
        // load; a non-admin session gets signed out.
        // DEFERRED to DOMContentLoaded: getSession() resolves from local
        // storage (no network) — fast enough to beat the module <script>
        // tags below, which made buildSidebar run before most routes had
        // registered (sidebar showed only Dashboard, a millisecond race).
        function bootFromSession() {
            sb.auth.getSession().then(async ({ data: { session } }) => {
                if (!session) return;
                const row = await verifyAdminSession(session);
                if (!row) {
                    console.warn('Non-admin session — signing out');
                    await sb.auth.signOut();
                    return;
                }
                enterApp(session, row);
            });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bootFromSession);
        } else {
            bootFromSession();
        }

        // openUser is provided by users.js (window.__openUser); this shim lets
        // any module reference it before that script evaluates.
        function openUser(id) { (window.__openUser || (() => ui.toast('Users module not loaded', 'error')))(id); }
    </script>

    <!-- Section modules (each registers its route) -->
    <script src="/admin-js/dashboard.js"></script>
    <script src="/admin-js/users.js"></script>
    <script src="/admin-js/reports.js"></script>
    <script src="/admin-js/appeals.js"></script>
    <script src="/admin-js/verifications.js"></script>
    <script src="/admin-js/blips.js"></script>
    <script src="/admin-js/deleted.js"></script>
    <script src="/admin-js/drops.js"></script>
</body>
</html>
