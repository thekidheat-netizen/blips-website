<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting…</title>
    <!--
        Historical note: this page used to host its own login form that called
        signInWithPassword and then redirected to /admin.html. That created a
        two-page login flow that could go out of sync with the dashboard's own
        login form + is_admin re-check (added in commit f1dbce1). Whenever the
        two checks disagreed — even transiently due to session-persistence
        timing — users would get bounced back here and stuck.

        The dashboard at /admin.html now has its own self-contained login UI,
        sign-in handler, and is_admin gate, so this page is redundant. Anyone
        who lands here gets sent straight to /admin so there's exactly one
        login surface for the whole site. Bookmarks and external links to
        /admin-login keep working.
    -->
    <meta http-equiv="refresh" content="0; url=/admin">
    <link rel="canonical" href="/admin">
    <style>
        body { background:#000; color:#bbb; font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        a { color:#00d4ff; }
    </style>
</head>
<body>
    <div>Redirecting to <a href="/admin">/admin</a>…</div>
    <script>
        // Belt-and-suspenders: meta refresh + JS redirect. If JS is enabled
        // this fires immediately; if not, the meta refresh kicks in.
        window.location.replace('/admin');
    </script>
</body>
</html>
